# A simple example of ClusterConfig object:
---
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: cluster-1
  region: us-east-1

managedNodeGroups:
  - name: simple-test
    instanceType: [ "m5.large","c3.large","c4.large","c5.large","c5d.large" ]
    desiredCapacity: 3
    spot: true
